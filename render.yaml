services:
  - type: web
    name: manucak
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py qr_yenile"
    startCommand: "gunicorn manucak.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.8"
      # Canlı adresi Render panelinden gir (örn: https://manucak.onrender.com)
      - key: SITE_URL
        sync: false
